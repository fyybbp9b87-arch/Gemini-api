<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UMN AI</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;500;600&display=swap" rel="stylesheet">

<style>

:root{
--bg:#0a0a0f;
--surface:#12121a;
--surface2:#1a1a26;
--border:rgba(255,255,255,0.07);
--red:#c0392b;
--green:#1abc9c;
--text:#e8e8f0;
--muted:#7070a0;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'DM Sans',sans-serif;
height:100vh;
display:flex;
flex-direction:column;
background:var(--bg);
color:var(--text);
overflow:hidden;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 22px;
border-bottom:1px solid var(--border);
background:rgba(10,10,15,0.85);
backdrop-filter:blur(20px);
}

.logo{
font-family:'Space Mono';
font-weight:700;
letter-spacing:3px;
color:var(--green);
}

/* CHAT */
#chat{
flex:1;
overflow-y:auto;
padding:24px 20px;
display:flex;
flex-direction:column;
gap:16px;
}

#welcome{
margin:auto;
text-align:center;
}

#welcome h2{
font-family:'Space Mono';
font-size:32px;
background:linear-gradient(135deg,var(--red),var(--green));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

#welcome p{
color:var(--muted);
}

/* messages */
.msg-wrap{
display:flex;
gap:10px;
max-width:860px;
}

.msg-wrap.user{
margin-left:auto;
flex-direction:row-reverse;
}

.avatar{
width:34px;
height:34px;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
font-family:'Space Mono';
font-size:11px;
font-weight:700;
}

.ai-av{
background:linear-gradient(135deg,var(--red),var(--green));
}

.user-av{
background:var(--surface2);
border:1px solid var(--border);
}

.msg{
padding:14px 16px;
border-radius:16px;
line-height:1.7;
font-size:15px;
max-width:700px;
border:1px solid var(--border);
background:var(--surface);
}

.msg.user{
background:rgba(26,188,156,0.08);
}

/* INPUT AREA */
#bottom{
padding:14px;
background:rgba(10,10,15,0.92);
border-top:1px solid var(--border);
}

/* API KEY BOX */
#apiKey{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:10px;
border:1px solid var(--border);
background:var(--surface);
color:white;
outline:none;
}

/* INPUT */
#input-box{
display:flex;
gap:10px;
background:var(--surface);
border:1px solid var(--border);
border-radius:16px;
padding:10px 14px;
}

textarea{
flex:1;
background:transparent;
border:none;
outline:none;
color:var(--text);
font-size:15px;
resize:none;
}

button{
width:38px;
height:38px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,var(--red),var(--green));
color:white;
cursor:pointer;
font-weight:700;
}

</style>
</head>

<body>

<header>
<div class="logo">UMN AI</div>
<div>Gemini Powered</div>
</header>

<div id="chat">
<div id="welcome">
<h2>How can I help you?</h2>
<p>Ask anything — code, science, maths, ideas.</p>
</div>
</div>

<div id="bottom">

<!-- 🔑 API KEY -->
<input id="apiKey" placeholder="Enter Gemini API Key">

<!-- 💬 INPUT -->
<div id="input-box">
<textarea id="input" rows="1" placeholder="Message..."></textarea>
<button onclick="send()">➤</button>
</div>

</div>

<script>

const chat = document.getElementById("chat");
const input = document.getElementById("input");

function addMsg(text,type){

document.getElementById("welcome")?.remove();

const wrap = document.createElement("div");
wrap.className = "msg-wrap " + (type==="user"?"user":"");

wrap.innerHTML = `
<div class="avatar ${type==="user"?"user-av":"ai-av"}">
${type==="user"?"YOU":"AI"}
</div>
<div class="msg ${type}">
${text}
</div>
`;

chat.appendChild(wrap);
chat.scrollTop = chat.scrollHeight;
}

async function send(){

const key = document.getElementById("apiKey").value.trim();
const text = input.value.trim();

if(!key) return alert("Enter Gemini API Key");
if(!text) return;

addMsg(text,"user");
input.value="";

try{

const res = await fetch(
`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`,
{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
contents:[{parts:[{text}]}]
})
}
);

const data = await res.json();

let reply = "";

if(data.error){
reply = "Error: " + data.error.message;
}
else if(data.candidates?.[0]?.content?.parts){
reply = data.candidates[0].content.parts
.map(p => p.text || "")
.join("");
}
else{
reply = "No response (check API key or quota)";
console.log(data);
}

addMsg(reply,"ai");

}catch(err){
addMsg("Request failed: " + err.message,"ai");
}

}

</script>

</body>
</html>
